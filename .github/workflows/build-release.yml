name: Android CI & Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      - name: Determine Next Version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch the latest release tag name using gh CLI. 
          # If no release exists, default to v0.9 so the next calculated version is v1.0
          LATEST_TAG=$(gh release view --json tagName --template '{{.tagName}}' 2>/dev/null || echo "v0.9")
          echo "Latest release tag found: $LATEST_TAG"

          # Remove "v" prefix if present
          VERSION_NUM=${LATEST_TAG#v}

          # Check if VERSION_NUM is a valid float
          if [[ "$VERSION_NUM" =~ ^[0-9]+(\.[0-9]+)?$ ]]; then
            # Increment version by 0.1
            NEW_VERSION=$(awk "BEGIN {print $VERSION_NUM + 0.1}")
            # Format to exactly 1 decimal place
            NEW_VERSION=$(printf "%.1f" "$NEW_VERSION")
          else
            NEW_VERSION="1.0"
          fi

          echo "Calculated next version: $NEW_VERSION"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "VERSION_CODE=${{ github.run_number }}" >> $GITHUB_ENV

      - name: Update Version in build.gradle.kts
        run: |
          echo "Updating versionCode to ${{ env.VERSION_CODE }} and versionName to ${{ env.NEW_VERSION }} in app/build.gradle.kts"
          sed -i 's/versionCode = .*/versionCode = ${{ env.VERSION_CODE }}/' app/build.gradle.kts
          sed -i 's/versionName = .*/versionName = "${{ env.NEW_VERSION }}"/' app/build.gradle.kts

      - name: Prepare Signing Keystore
        run: |
          if [ -n "${{ secrets.SIGNING_KEY_BASE64 }}" ]; then
            echo "Decoding release signing key..."
            echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 -d > "${{ github.workspace }}/my-upload-key.jks"
            echo "STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
            echo "KEYSTORE_PATH=${{ github.workspace }}/my-upload-key.jks" >> $GITHUB_ENV
          else
            echo "No custom signing key found in secrets. Generating a temporary signing key for this build..."
            keytool -genkeypair -v \
              -keystore "${{ github.workspace }}/my-upload-key.jks" \
              -alias upload \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=TTS Server, OU=App, O=TTS, L=Beijing, S=Beijing, C=CN" \
              -storepass "temp_password" \
              -keypass "temp_password"
            
            echo "STORE_PASSWORD=temp_password" >> $GITHUB_ENV
            echo "KEY_PASSWORD=temp_password" >> $GITHUB_ENV
            echo "KEYSTORE_PATH=${{ github.workspace }}/my-upload-key.jks" >> $GITHUB_ENV
          fi

      - name: Build Release APKs
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          STORE_PASSWORD: ${{ env.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}
        run: |
          gradle assembleRelease

      - name: Locate and Rename Build Artifacts
        run: |
          ARM64_APK=$(find app/build/outputs/apk/release -name "*arm64-v8a*.apk" | head -n 1)
          ARMV7_APK=$(find app/build/outputs/apk/release -name "*armeabi-v7a*.apk" | head -n 1)
          
          if [ -z "$ARM64_APK" ] || [ -z "$ARMV7_APK" ]; then
            echo "Build artifacts not found!"
            exit 1
          fi
          
          mkdir -p release-artifacts
          
          NEW_ARM64_NAME="release-artifacts/TTS-V${{ env.NEW_VERSION }}-arm64-v8a.apk"
          NEW_ARMV7_NAME="release-artifacts/TTS-V${{ env.NEW_VERSION }}-arm-v7a.apk"
          
          cp "$ARM64_APK" "$NEW_ARM64_NAME"
          cp "$ARMV7_APK" "$NEW_ARMV7_NAME"
          
          echo "Renamed arm64 APK to: $NEW_ARM64_NAME"
          echo "Renamed armv7 APK to: $NEW_ARMV7_NAME"
          
          echo "ARM64_APK_PATH=$NEW_ARM64_NAME" >> $GITHUB_ENV
          echo "ARMV7_APK_PATH=$NEW_ARMV7_NAME" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.NEW_VERSION }}
          name: v${{ env.NEW_VERSION }}
          generate_release_notes: true
          files: |
            ${{ env.ARM64_APK_PATH }}
            ${{ env.ARMV7_APK_PATH }}
          token: ${{ github.token }}
